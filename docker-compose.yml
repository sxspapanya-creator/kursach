version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/app/frontend:ro
    depends_on:
      - app
      - node
      - payment
    networks:
      - app

  payment:
    build:
      context: ./payment-api
    container_name: payment
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app

  app:
    build:
      context: ./backend
    container_name: app
    volumes:
      - ./backend:/app
    environment:
      - APP_ENV=development
      - COMPOSER_MEMORY_LIMIT=-1
    restart: unless-stopped
    networks:
      - app

  node:
    build:
      context: ./frontend
    container_name: node
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=http://localhost/api
    # Анонимный том /app/node_modules при первом запуске пустой — ставим зависимости, иначе Vite не поднимется (502)
    command: sh -c "npm install && exec npm run dev"
    restart: unless-stopped
    networks:
      - app

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "13306:3306"
    networks:
      - app

networks:
  app:

volumes:
  db_data:
  postgres_data:
