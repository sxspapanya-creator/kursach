server {
    listen 80;
    server_name localhost;

    # Docker встроенный DNS — без этого nginx запоминает старый IP контейнера после recreate → 502
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /test-payment {
        return 301 /test-payment/;
    }

    location /test-payment/ {
        set $payment_upstream payment;
        proxy_pass http://$payment_upstream:9714/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        set $vite_upstream node;
        proxy_pass http://$vite_upstream:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        set $app_upstream app;
        proxy_pass http://$app_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /auth/ {
        set $app_upstream_auth app;
        proxy_pass http://$app_upstream_auth:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
